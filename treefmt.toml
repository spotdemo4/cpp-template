#:schema https://www.schemastore.org/treefmt.json

[formatter.clang]
command = "clang-format"
options = ["-i"]
includes = ["*.cpp", "*.hpp"]

[formatter.nixfmt]
command = "nixfmt"
includes = ["*.nix"]

[formatter.oxfmt]
command = "oxfmt"
options = ["--write"]
includes = ["*.json", "*.yaml", "*.toml", "*.md"]
